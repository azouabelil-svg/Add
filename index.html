<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        body { font-family: 'Amiri', serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #fff; text-align: center; border-bottom: 1px solid #eee; }
        select { width: 90%; padding: 12px; border-radius: 15px; border: 2px solid #128c7e; font-size: 18px; font-family: 'Amiri'; outline: none; }
        #quran-area { flex: 1; overflow-y: auto; padding: 25px; text-align: center; font-size: 32px; line-height: 2.8; color: #cbd5e0; }
        .word { display: inline-block; margin: 0 5px; transition: 0.1s; }
        .ayah-num { color: #128c7e; font-size: 20px; margin: 0 8px; font-weight: bold; }
        .hidden-v { color: rgba(0,0,0,0.02) !important; }
        .correct { color: #128c7e !important; font-weight: bold; }
        .footer { background: #fff; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .btn { border: none; background: #f8f9fa; width: 60px; height: 60px; border-radius: 50%; font-size: 25px; cursor: pointer; }
        .mic-main { width: 85px; height: 85px; background: #128c7e; color: white; border-radius: 50%; box-shadow: 0 10px 20px rgba(18,140,126,0.3); }
        .rec-on { background: #ff4757 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <select id="sSelect"><option>تحميل السور...</option></select>
</header>

<div id="quran-area">اختر سورة وابدأ التلاوة...</div>

<div class="footer">
    <button class="btn" id="ref" onclick="location.reload()">🔄</button>
    <button class="btn mic-main" id="mic">🎤</button>
    <button class="btn" id="eye">👁️</button>
</div>

<script>
    const sSelect = document.getElementById('sSelect');
    const area = document.getElementById('quran-area');
    const mic = document.getElementById('mic');
    const eye = document.getElementById('eye');
    let wordsDB = [];

    // جلب السور
    fetch('https://api.alquran.cloud/v1/surah').then(r => r.json()).then(d => {
        sSelect.innerHTML = '<option value="">-- اختر السورة --</option>' + 
            d.data.map(s => `<option value="${s.number}">${s.number}. ${s.name}</option>`).join("");
    });

    sSelect.onchange = async () => {
        if(!sSelect.value) return;
        area.innerHTML = "جاري التحميل...";
        const r = await fetch(`https://api.alquran.cloud/v1/surah/${sSelect.value}`);
        const d = await r.json();
        area.innerHTML = ""; wordsDB = [];
        d.data.ayahs.forEach(ayah => {
            const ayWords = ayah.text.split(/\s+/);
            ayWords.forEach(w => {
                const span = document.createElement('span');
                span.className = 'word'; span.innerText = w;
                span.id = `w-${wordsDB.length}`;
                area.appendChild(span);
                wordsDB.push(w.replace(/[\u064B-\u065F]/g, "")); // حفظ الكلمة بدون تشكيل للمقارنة السريعة
            });
            const n = document.createElement('span');
            n.className = 'ayah-num'; n.innerText = `﴿${ayah.numberInSurah}﴾`;
            area.appendChild(n);
        });
    };

    eye.onclick = () => {
        document.querySelectorAll('.word').forEach(w => w.classList.toggle('hidden-v'));
    };

    // محرك ميكروفون مبسط وسريع جداً
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
        const r = new Recognition();
        r.lang = 'ar-SA'; r.continuous = true; r.interimResults = true;

        mic.onclick = () => {
            if(mic.classList.contains('rec-on')) { r.stop(); mic.classList.remove('rec-on'); }
            else { r.start(); mic.classList.add('rec-on'); }
        };

        r.onresult = (e) => {
            let heard = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                heard += e.results[i][0].transcript + " ";
            }
            const cleanHeard = heard.replace(/[\u064B-\u065F]/g, "");
            
            // بحث سريع جداً في قاعدة البيانات المصغرة
            wordsDB.forEach((cleanOrig, i) => {
                if (cleanHeard.includes(cleanOrig)) {
                    const el = document.getElementById(`w-${i}`);
                    if (el) { el.classList.add('correct'); el.classList.remove('hidden-v'); }
                }
            });
        };
        r.onend = () => { if(mic.classList.contains('rec-on')) r.start(); };
    }
</script>
</body>
</html>
