<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة العالمي - إصدار المحترفين</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        :root { --primary: #00a884; --bg: #f0f2f5; --dark: #111b21; }
        
        body { font-family: 'Amiri', serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; z-index: 10; }
        
        select { padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-family: 'Amiri'; font-size: 18px; outline: none; width: 80%; }

        /* منطقة عرض المصحف - تدعم التمرير لصفحات كاملة */
        #quran-viewport { 
            flex: 1; overflow-y: auto; padding: 30px; margin: 15px;
            background: white; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            font-size: 32px; line-height: 2.5; text-align: center; color: #7f8c8d;
        }

        .word { display: inline-block; margin: 0 4px; transition: 0.3s ease; cursor: default; }
        .hidden-mode { color: transparent !important; text-shadow: 0 0 10px rgba(0,0,0,0.08); }
        .correct { color: var(--primary) !important; font-weight: bold; text-shadow: none !important; }
        .wrong { color: #e74c3c !important; text-decoration: underline; text-shadow: none !important; }

        /* شريط الأدوات السفلي */
        .bottom-bar { background: white; padding: 20px; display: flex; justify-content: space-evenly; align-items: center; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        
        .action-btn { background: #f0f2f5; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .action-btn.active { background: #e8f5f2; color: var(--primary); }
        
        .mic-main { width: 85px; height: 85px; background: var(--primary); color: white; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; box-shadow: 0 8px 20px rgba(0, 168, 132, 0.4); }
        .recording { background: #ea4335; animation: ripple 1.5s infinite; }

        @keyframes ripple { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <select id="surahPicker">
        <option value="">-- اختر السورة --</option>
    </select>
</header>

<div id="quran-viewport">
    <p id="mainText">يرجى اختيار سورة من الأعلى لبدء التلاوة والتصحيح...</p>
</div>

<div class="bottom-bar">
    <button class="action-btn" id="eyeToggle" title="إخفاء/إظهار">👁️</button>
    <button class="mic-main" id="micBtn">🎤</button>
    <button class="action-btn" id="resetBtn" onclick="location.reload()">🔄</button>
</div>

<script>
    const surahPicker = document.getElementById('surahPicker');
    const mainText = document.getElementById('mainText');
    const micBtn = document.getElementById('micBtn');
    const eyeToggle = document.getElementById('eyeToggle');
    let wordsData = [];

    // جلب السور من API القرآن الكريم
    async function loadSurahs() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        data.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.text = `${s.number}. ${s.name}`;
            surahPicker.add(opt);
        });
    }
    loadSurahs();

    // عند اختيار سورة
    surahPicker.onchange = async () => {
        if(!surahPicker.value) return;
        mainText.innerHTML = "جاري جلب السورة من المصحف...";
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${surahPicker.value}`);
        const data = await res.json();
        const fullText = data.data.ayahs.map(a => a.text).join(" ");
        wordsData = fullText.split(/\s+/);
        renderQuran();
    };

    function renderQuran() {
        mainText.innerHTML = wordsData.map((w, i) => `<span id="w-${i}" class="word">${w}</span>`).join("");
    }

    // ميزة الإخفاء (العين)
    eyeToggle.onclick = () => {
        eyeToggle.classList.toggle('active');
        document.querySelectorAll('.word').forEach(w => w.classList.toggle('hidden-mode'));
    };

    // نظام التعرف على الصوت (Speech-to-Text)
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
        const rec = new Recognition();
        rec.lang = 'ar-SA';
        rec.continuous = true;
        rec.interimResults = true;

        micBtn.onclick = () => {
            if (micBtn.classList.contains('recording')) {
                rec.stop();
                micBtn.classList.remove('recording');
            } else {
                rec.start();
                micBtn.classList.add('recording');
            }
        };

        rec.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            analyze(transcript.trim());
        };

        function analyze(spokenText) {
            wordsData.forEach((orig, index) => {
                const el = document.getElementById(`w-${index}`);
                // إزالة التشكيل للمقارنة الذكية
                const cleanOrig = orig.replace(/[\u064B-\u065F]/g, "");
                
                if (spokenText.includes(cleanOrig)) {
                    el.classList.add('correct');
                    el.classList.remove('hidden-mode', 'wrong');
                }
            });
        }
    }
</script>
</body>
</html>
