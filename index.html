<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة العالمي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Changa:wght@500&display=swap');

        body {
            background: linear-gradient(135deg, #1e3799, #0c2461);
            color: white;
            font-family: 'Changa', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 { color: #1e3799; margin-bottom: 20px; }

        .quran-display {
            font-family: 'Amiri', serif;
            font-size: 30px;
            line-height: 2;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed #1e3799;
            margin-bottom: 25px;
            min-height: 120px;
        }

        .word { display: inline-block; margin: 0 5px; color: #bbb; transition: 0.3s; }
        .correct { color: #27ae60 !important; transform: scale(1.1); font-weight: bold; }
        .wrong { color: #e74c3c !important; text-decoration: underline; }

        .mic-area { margin-top: 20px; }

        .btn-mic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background: #1e3799;
            color: white;
            font-size: 35px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(30, 55, 153, 0.3);
        }

        .btn-mic.recording {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); }
        }

        #log { font-size: 14px; margin-top: 15px; color: #777; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>المصحح الذكي الاحترافي</h2>
    
    <div id="quranContent" class="quran-display">
        </div>

    <div class="mic-area">
        <button id="mainBtn" class="btn-mic">🎤</button>
        <p id="log">اضغط للبدء بالتصحيح</p>
    </div>
</div>

<script>
    const ayahs = ["الحمد", "لله", "رب", "العالمين", "الرحمن", "الرحيم", "مالك", "يوم", "الدين"];
    const content = document.getElementById('quranContent');
    const mainBtn = document.getElementById('mainBtn');
    const log = document.getElementById('log');

    // عرض الكلمات
    ayahs.forEach((w, i) => {
        content.innerHTML += `<span id="word-${i}" class="word">${w}</span> `;
    });

    // إعداد الميكروفون
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Speech) {
        log.innerText = "المتصفح لا يدعم الصوت. استخدم Chrome";
    } else {
        const rec = new Speech();
        rec.lang = 'ar-SA';
        rec.continuous = true;
        rec.interimResults = true;

        let active = false;

        mainBtn.onclick = () => {
            if (!active) {
                rec.start();
                mainBtn.classList.add('recording');
                log.innerText = "جاري الاستماع... اقرأ الفاتحة";
                active = true;
            } else {
                rec.stop();
                mainBtn.classList.remove('recording');
                log.innerText = "توقف الاستماع";
                active = false;
            }
        };

        rec.onresult = (event) => {
            let result = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                result += event.results[i][0].transcript;
            }
            compare(result.trim());
        };

        function compare(text) {
            console.log("نطقت:", text);
            ayahs.forEach((original, index) => {
                const el = document.getElementById(`word-${index}`);
                // تنظيف الكلمات (إزالة التشكيل)
                const cleanOrig = original.replace(/[\u064B-\u065F]/g, "");
                const cleanText = text.replace(/[\u064B-\u065F]/g, "");

                if (cleanText.includes(cleanOrig)) {
                    el.className = 'word correct';
                } else if (text.split(" ").length > index + 1 && !el.classList.contains('correct')) {
                    el.className = 'word wrong';
                }
            });
        }

        rec.onerror = (e) => {
            log.innerText = "خطأ: " + e.error;
            mainBtn.classList.remove('recording');
            active = false;
        };
    }
</script>

</body>
</html>
