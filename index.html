<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي</title>
    <style>
        /* الحفاظ على نفس الواجهة تماماً كما في صورك */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        :root { --primary: #128c7e; --text: #2d3748; }
        body { font-family: 'Amiri', serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #fff; text-align: center; border-bottom: 1px solid #eee; }
        select { width: 90%; padding: 10px; border-radius: 12px; border: 2px solid #eee; font-size: 18px; font-family: 'Amiri'; outline: none; }
        #quran-area { flex: 1; overflow-y: auto; padding: 25px; text-align: center; font-size: 32px; line-height: 2.6; color: #cbd5e0; }
        .word { display: inline-block; margin: 0 4px; transition: 0.1s; }
        .ayah-num { color: var(--primary); font-size: 20px; margin: 0 8px; font-weight: bold; vertical-align: middle; }
        .hidden-v { color: rgba(0,0,0,0.02) !important; }
        .correct { color: var(--primary) !important; font-weight: bold; }
        .footer { background: #fff; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .btn { border: none; background: #f8f9fa; width: 55px; height: 55px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        .mic-main { width: 85px; height: 85px; background: #ff6b6b; color: white; font-size: 35px; border-radius: 50%; box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3); }
        .rec-active { background: #ff4757; animation: blink 1.2s infinite; }
        @keyframes blink { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <select id="surahSelect"><option>تحميل السور...</option></select>
</header>

<div id="quran-area">اختر سورة لبدء التسميع...</div>

<div class="footer">
    <button class="btn" id="refresh" onclick="location.reload()">🔄</button>
    <button class="btn mic-main" id="mic">🎤</button>
    <button class="btn" id="eye">👁️</button>
</div>

<script>
    const surahSelect = document.getElementById('surahSelect');
    const quranArea = document.getElementById('quran-area');
    const micBtn = document.getElementById('mic');
    const eyeBtn = document.getElementById('eye');
    let wordsDB = [];

    fetch('https://api.alquran.cloud/v1/surah').then(r => r.json()).then(d => {
        surahSelect.innerHTML = '<option value="">-- اختر السورة --</option>' + 
            d.data.map(s => `<option value="${s.number}">${s.number}. ${s.name}</option>`).join("");
    });

    surahSelect.onchange = async () => {
        if(!surahSelect.value) return;
        quranArea.innerHTML = "جاري جلب الآيات...";
        const r = await fetch(`https://api.alquran.cloud/v1/surah/${surahSelect.value}`);
        const d = await r.json();
        quranArea.innerHTML = "";
        wordsDB = [];
        d.data.ayahs.forEach(ayah => {
            const ayahWords = ayah.text.split(/\s+/);
            ayahWords.forEach(w => {
                const span = document.createElement('span');
                span.className = 'word';
                span.innerText = w;
                span.id = `w-${wordsDB.length}`;
                quranArea.appendChild(span);
                wordsDB.push(w);
            });
            const n = document.createElement('span');
            n.className = 'ayah-num';
            n.innerText = `﴿${ayah.numberInSurah}﴾`;
            quranArea.appendChild(n);
        });
    };

    eyeBtn.onclick = () => {
        document.querySelectorAll('.word').forEach(w => w.classList.toggle('hidden-v'));
    };

    // --- تحديث محرك الميكروفون الحساس ---
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = 'ar-SA';
        rec.continuous = true;
        rec.interimResults = true; // تفعيل النتائج الفورية
        rec.maxAlternatives = 5;    // البحث عن أفضل تطابق للكلمة

        micBtn.onclick = () => {
            if(micBtn.classList.contains('rec-active')) {
                rec.stop();
                micBtn.classList.remove('rec-active');
            } else {
                rec.start();
                micBtn.classList.add('rec-active');
            }
        };

        rec.onresult = (event) => {
            let fullTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                fullTranscript += event.results[i][0].transcript + " ";
            }
            
            const cleanHeard = fullTranscript.replace(/[\u064B-\u065F]/g, "").trim();
            
            // معالجة الكلمات كلمة بكلمة لضمان عدم ضياع أي حرف
            wordsDB.forEach((orig, i) => {
                const el = document.getElementById(`w-${i}`);
                if (!el.classList.contains('correct')) {
                    const cleanOrig = orig.replace(/[\u064B-\u065F]/g, "");
                    if (cleanHeard.includes(cleanOrig)) {
                        el.classList.add('correct');
                        el.classList.remove('hidden-v');
                    }
                }
            });
        };

        rec.onerror = () => { micBtn.classList.remove('rec-active'); };
        rec.onend = () => { if(micBtn.classList.contains('rec-active')) rec.start(); };
    }
</script>
</body>
</html>
