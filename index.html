<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #fff; }
        .quran-text { font-size: 1.8rem; line-height: 2.5; text-align: center; color: #000; padding: 20px; }
        .v-hide { filter: blur(10px); opacity: 0.1; }
        .v-show { filter: blur(0); opacity: 1; font-weight: bold; }
        /* الألوان المطلوبة */
        #live { color: #000000; font-size: 1.5rem; font-weight: bold; }
        .error { color: #ff0000 !important; text-decoration: underline; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="h-1/4 bg-gray-100 flex items-center justify-center border-b p-4">
        <div id="live">تحدث الآن.. سأكتب كل ما تقوله هنا</div>
    </div>

    <div id="qBox" class="flex-1 overflow-y-auto quran-text">
        اضغط القائمة لاختيار سورة
    </div>

    <div class="p-6 bg-white border-t flex justify-around items-center">
        <button onclick="showMenu()" class="p-4 bg-emerald-100 rounded-full text-emerald-700">القائمة</button>
        <button id="micBtn" class="w-20 h-20 bg-emerald-600 rounded-full text-white text-3xl shadow-lg">🎤</button>
        <button onclick="location.reload()" class="p-4 bg-gray-100 rounded-full text-gray-600">تحديث</button>
    </div>

    <div id="menu" class="fixed inset-0 bg-black/50 hidden z-50 flex items-end">
        <div class="bg-white w-full h-3/4 rounded-t-3xl p-6 overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">اختر سورة</h2>
            <div id="sList"></div>
        </div>
    </div>

    <script>
        let ayahs = [];
        let index = 0;
        let isListening = false;

        // 1. تعريف الميكروفون
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        recognition.continuous = true;
        recognition.interimResults = true;

        // 2. ماذا يحدث عند الكلام
        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }

            // إظهار الكلام فوراً بالأسود
            const liveDisplay = document.getElementById('live');
            liveDisplay.innerHTML = transcript;
            liveDisplay.classList.remove('error');

            // تنظيف النص للمقارنة
            const clean = (t) => t.replace(/[\u064B-\u065F]/g, "").replace(/[إأآا]/g, "ا").trim();
            
            if (ayahs[index]) {
                const targetText = clean(ayahs[index].text);
                const userText = clean(transcript);

                if (targetText.includes(userText) && userText.length > 2) {
                    // إذا كان الكلام صحيحاً ووصل لنصف الآية تقريباً
                    if (userText.length > targetText.length * 0.4) {
                        document.getElementById(`v-${index}`).className = "v-show";
                        index++;
                    }
                } else if (userText.length > 5) {
                    // إذا كان الكلام خاطئاً لونه بالأحمر
                    liveDisplay.classList.add('error');
                }
            }
        };

        recognition.onend = () => { if(isListening) recognition.start(); };

        document.getElementById('micBtn').onclick = () => {
            if (!isListening) {
                isListening = true;
                recognition.start();
                document.getElementById('micBtn').style.backgroundColor = "red";
            } else {
                isListening = false;
                recognition.stop();
                document.getElementById('micBtn').style.backgroundColor = "#059669";
            }
        };

        // 3. جلب البيانات
        async function getSurahs() {
            const r = await fetch('https://api.alquran.cloud/v1/surah');
            const d = await r.json();
            const list = document.getElementById('sList');
            d.data.forEach(s => {
                const div = document.createElement('div');
                div.className = "p-4 border-b active:bg-gray-100";
                div.innerHTML = s.name;
                div.onclick = () => loadSurah(s.number, s.name);
                list.appendChild(div);
            });
        }

        async function loadSurah(num, name) {
            document.getElementById('menu').classList.add('hidden');
            const r = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
            const d = await r.json();
            ayahs = d.data.ayahs;
            index = 0;
            document.getElementById('qBox').innerHTML = ayahs.map((a, i) => 
                `<span id="v-${i}" class="v-hide">${a.text} (﴿${a.numberInSurah}﴾)</span>`
            ).join(' ');
        }

        function showMenu() { document.getElementById('menu').classList.remove('hidden'); }
        window.onload = getSurahs;
    </script>
</body>
</html>
