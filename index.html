<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي - الإصدار الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121111/diff_match_patch.js"></script>
    <style>
        :root {
            --primary-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Amiri', serif; background-color: var(--bg-color); text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .quran-text { font-size: 32px; line-height: 2.5; margin-bottom: 20px; color: #7f8c8d; }
        .word { transition: all 0.3s ease; padding: 2px 4px; border-radius: 5px; }
        .correct { color: var(--primary-color); font-weight: bold; }
        .wrong { color: var(--error-color); background: rgba(231, 76, 60, 0.1); text-decoration: line-through; }
        .active-word { border-bottom: 3px solid var(--primary-color); color: #2c3e50; }
        
        .mic-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            background: var(--primary-color); color: white; font-size: 28px; 
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .recording { background: var(--error-color); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div id="display" class="quran-text">
        </div>
    
    <button id="micBtn" class="mic-btn">🎤</button>
    <p id="status">اضغط وابدأ التلاوة</p>
</div>

<script>
    // النص الأصلي (يمكنك استبداله بأي سورة)
    const originalText = "الحمد لله رب العالمين الرحمن الرحيم مالك يوم الدين إياك نعبد وإياك نستعين";
    const targetWords = originalText.split(" ");
    const dmp = new diff_match_patch();
    
    const display = document.getElementById('display');
    const micBtn = document.getElementById('micBtn');
    
    // توليد الكلمات في الصفحة
    targetWords.forEach((w, i) => {
        display.innerHTML += `<span id="w-${i}" class="word">${w}</span> `;
    });

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ar-SA';

        recognition.onresult = (event) => {
            let fullTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                fullTranscript += event.results[i][0].transcript;
            }
            analyzeSpeech(fullTranscript.trim());
        };
    }

    function analyzeSpeech(transcript) {
        const spokenWords = transcript.split(" ");
        
        targetWords.forEach((original, index) => {
            const wordEl = document.getElementById(`w-${index}`);
            
            // تنظيف الكلمات من التشكيل للمقارنة العادلة
            const cleanOriginal = original.replace(/[\u064B-\u065F]/g, "");
            
            // البحث عن الكلمة المنطوقة في قائمة الكلمات التي قيلت
            let found = spokenWords.some(spoken => {
                const cleanSpoken = spoken.replace(/[\u064B-\u065F]/g, "");
                // استخدام منطق المكتبة لحساب المسافة بين الكلمتين
                const diff = dmp.diff_main(cleanOriginal, cleanSpoken);
                const distance = dmp.diff_levenshtein(diff);
                return distance <= 1; // السماح بخطأ حرف واحد فقط (مثل واو العطف أو خطأ بسيط)
            });

            if (found) {
                wordEl.classList.add('correct');
                wordEl.classList.remove('wrong');
            } else {
                // إذا نطق المستخدم كلمات أكثر من موقع الكلمة الحالي ولم يأتِ بالكلمة الصحيحة
                if (spokenWords.length > index + 1 && !wordEl.classList.contains('correct')) {
                    wordEl.classList.add('wrong');
                }
            }
        });
    }

    micBtn.onclick = () => {
        if (micBtn.classList.contains('recording')) {
            recognition.stop();
            micBtn.classList.remove('recording');
        } else {
            recognition.start();
            micBtn.classList.add('recording');
            document.querySelectorAll('.word').forEach(w => w.className = 'word');
        }
    };
</script>

</body>
</html>
