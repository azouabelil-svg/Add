<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121111/diff_match_patch.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

        :root {
            --primary: #128c7e;
            --error: #d32f2f;
            --bg: #fdfdfd;
        }

        body {
            font-family: 'Amiri', serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 24px; margin-bottom: 20px; }

        .quran-box {
            background: #fafafa;
            padding: 20px;
            border-radius: 15px;
            min-height: 150px;
            border: 1px solid #eee;
            margin-bottom: 30px;
            font-size: 28px;
            line-height: 2;
        }

        .word {
            display: inline-block;
            margin: 0 4px;
            color: #ccc; /* لون رمادي قبل القراءة */
            transition: 0.3s;
        }

        .correct { color: var(--primary) !important; font-weight: bold; }
        .wrong { color: var(--error) !important; text-decoration: underline; }

        .controls { position: relative; }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(18, 140, 126, 0.3);
            transition: 0.3s;
        }

        .mic-btn.active {
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(211, 47, 47, 0); }
            100% { transform: scale(1); }
        }

        #status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>مصحح التلاوة الذكي</h1>
    
    <div id="quranBox" class="quran-box">
        </div>

    <div class="controls">
        <button id="micBtn" class="mic-btn">🎤</button>
        <p id="status">اضغط على الميكروفون وابدأ القراءة</p>
    </div>
</div>

<script>
    // النص المراد قراءته
    const surahText = "الحمد لله رب العالمين الرحمن الرحيم مالك يوم الدين إياك نعبد وإياك نستعين";
    const words = surahText.split(" ");
    const quranBox = document.getElementById('quranBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    const dmp = new diff_match_patch();

    // بناء واجهة الكلمات
    words.forEach((word, i) => {
        const span = document.createElement('span');
        span.innerText = word;
        span.className = 'word';
        span.id = 'word-' + i;
        quranBox.appendChild(span);
    });

    // إعدادات التعرف على الصوت
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        statusText.innerText = "متصفحك لا يدعم التعرف على الصوت. جرب جوجل كروم.";
        micBtn.style.display = "none";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        recognition.continuous = true;
        recognition.interimResults = true;

        let isRecording = false;

        micBtn.onclick = () => {
            if (!isRecording) {
                recognition.start();
                micBtn.classList.add('active');
                statusText.innerText = "جاري الاستماع... اقرأ الآن";
                isRecording = true;
            } else {
                recognition.stop();
                micBtn.classList.remove('active');
                statusText.innerText = "تم التوقف.";
                isRecording = false;
            }
        };

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }
            processText(transcript.trim());
        };

        recognition.onerror = (event) => {
            console.error("خطأ في الميكروفون:", event.error);
            statusText.innerText = "خطأ: " + event.error;
            micBtn.classList.remove('active');
            isRecording = false;
        };

        function processText(spokenText) {
            const spokenWords = spokenText.split(/\s+/);
            
            words.forEach((original, index) => {
                const element = document.getElementById('word-' + index);
                
                // تنظيف الكلمات من التشكيل للمقارنة
                const cleanOriginal = original.replace(/[\u064B-\u065F]/g, "");
                
                let isMatch = spokenWords.some(spoken => {
                    const cleanSpoken = spoken.replace(/[\u064B-\u065F]/g, "");
                    const diff = dmp.diff_main(cleanOriginal, cleanSpoken);
                    return dmp.diff_levenshtein(diff) <= 1; // السماح بخطأ بسيط جداً
                });

                if (isMatch) {
                    element.className = 'word correct';
                } else if (spokenWords.length > index + 2 && !element.classList.contains('correct')) {
                    // إذا تكلمت كثيراً ولم تنطق الكلمة الصحيحة بعد
                    element.className = 'word wrong';
                }
            });
        }
    }
</script>

</body>
</html>
