<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصحح التلاوة الذكي</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f4f4f4; }
        .quran-container { background: white; padding: 20px; margin: 50px auto; width: 80%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .ayah { font-size: 24px; margin: 10px; display: inline-block; transition: 0.3s; }
        .hidden-text { color: transparent !important; text-shadow: 0 0 5px rgba(0,0,0,0); } /* إخفاء النص مع ترك مكانه */
        .wrong { color: red !important; text-shadow: none !important; }
        .correct { color: green !important; text-shadow: none !important; }
        .mic-btn { font-size: 50px; cursor: pointer; border: none; background: none; color: #27ae60; }
        .number { color: #27ae60; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div class="quran-container">
    <h2>سورة الفاتحة</h2>
    <hr>
    <div id="quran-text">
        </div>
    <br><br>
    <button class="mic-btn" id="start-btn">🎤</button>
    <p id="status">اضغط على الميكروفون وابدأ القراءة...</p>
    <button onclick="toggleVisibility()">إخفاء/إظهار النص</button>
</div>

<script>
    // النص الأصلي للمقارنة
    const surahFatiha = [
        "بسم الله الرحمن الرحيم",
        "الحمد لله رب العالمين",
        "الرحمن الرحيم",
        "مالك يوم الدين"
    ];

    const container = document.getElementById('quran-text');
    
    // توليد واجهة الآيات
    surahFatiha.forEach((text, index) => {
        container.innerHTML += `<span class="ayah hidden-text" id="ayah-${index}">${text} <span class="number">{${index + 1}}</span></span>`;
    });

    function toggleVisibility() {
        document.querySelectorAll('.ayah').forEach(el => el.classList.toggle('hidden-text'));
    }

    // إعدادات التعرف على الصوت
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.continuous = true;
    recognition.interimResults = true;

    document.getElementById('start-btn').onclick = () => {
        recognition.start();
        document.getElementById('status').innerText = "جاري الاستماع...";
    };

    recognition.onresult = (event) => {
        let transcript = event.results[event.results.length - 1][0].transcript.trim();
        console.log("الكلمة المسموعة:", transcript);

        // منطق بسيط للمقارنة (يمكن تطويره باستخدام مكتبات String Similarity)
        surahFatiha.forEach((original, index) => {
            let ayahElement = document.getElementById(`ayah-${index}`);
            if (transcript.includes(original)) {
                ayahElement.classList.remove('hidden-text', 'wrong');
                ayahElement.classList.add('correct');
            } else if (isMistake(transcript, original)) {
                ayahElement.classList.add('wrong');
            }
        });
    };

    function isMistake(heard, original) {
        // هنا تضع منطق اكتشاف الخطأ (مثلاً إذا كانت الكلمة تشبه الآية لكنها ليست هي)
        return false; 
    }
</script>
</body>
</html>
