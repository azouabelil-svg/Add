<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحح الذكي الاحترافي</title>
    <style>
        :root {
            --primary: #2ecc71;
            --error: #e74c3c;
            --text: #2c3e50;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .app-card { max-width: 700px; margin: auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .quran-display { font-size: 28px; line-height: 2; margin-bottom: 30px; min-height: 100px; text-align: center; }
        .word { display: inline-block; margin: 0 4px; transition: all 0.3s; color: #95a5a6; } /* افتراضي: باهت قبل القراءة */
        .correct { color: var(--primary); font-weight: bold; }
        .wrong { color: var(--error); font-weight: bold; text-decoration: underline; }
        .current { border-bottom: 3px solid var(--primary); color: var(--text); }
        
        .controls { text-align: center; margin-top: 20px; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .mic-btn.active { animation: pulse 1.5s infinite; background: var(--error); }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="quran-display" id="quranDisplay">
        </div>
    
    <div class="controls">
        <button id="startBtn" class="mic-btn">🎤</button>
        <p id="info">اضغط للمسح والبدء بالتصحيح اللحظي</p>
    </div>
</div>

<script>
    // النص المرجعي (يمكنك جلب السور من API القرآن لاحقاً)
    const originalAyah = "الحمد لله رب العالمين الرحمن الرحيم مالك يوم الدين";
    const wordsArray = originalAyah.split(" ");
    const displayElement = document.getElementById('quranDisplay');
    
    // بناء الواجهة: كل كلمة في عنصر منفصل
    wordsArray.forEach((word, index) => {
        displayElement.innerHTML += `<span id="word-${index}" class="word">${word}</span>`;
    });

    let currentWordIndex = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ar-SA';
    recognition.interimResults = true;
    recognition.continuous = true;

    document.getElementById('startBtn').onclick = function() {
        if (this.classList.contains('active')) {
            recognition.stop();
            this.classList.remove('active');
        } else {
            recognition.start();
            this.classList.add('active');
            currentWordIndex = 0;
            resetColors();
        }
    };

    recognition.onresult = (event) => {
        let lastTranscript = event.results[event.results.length - 1][0].transcript.trim().split(" ");
        let heardWord = lastTranscript[lastTranscript.length - 1]; // أخذ آخر كلمة نطقها المستخدم

        compareWord(heardWord);
    };

    function compareWord(heard) {
        if (currentWordIndex >= wordsArray.length) return;

        let targetWord = wordsArray[currentWordIndex];
        let element = document.getElementById(`word-${currentWordIndex}`);

        // تنظيف الكلمات من التشكيل للمقارنة بدقة (المنطق الأساسي للذكاء الاصطناعي)
        let cleanHeard = heard.replace(/[\u064B-\u065F]/g, "");
        let cleanTarget = targetWord.replace(/[\u064B-\u065F]/g, "");

        if (cleanHeard === cleanTarget) {
            element.className = 'word correct';
            currentWordIndex++;
        } else {
            // إذا كانت الكلمة مختلفة، يتم تلوينها بالأحمر
            element.className = 'word wrong';
            // ننتظر الكلمة التالية ليصحح نفسه
        }
    }

    function resetColors() {
        document.querySelectorAll('.word').forEach(el => el.className = 'word');
    }
</script>
</body>
</html>
